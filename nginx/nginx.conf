events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    upstream backend {
        server api:8000;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;

        # ── SSE 스트리밍: 버퍼링 끔(ADR-0007) ──
        location /chat {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── 백엔드 API(JSON/문서) ──
        location /recommend { proxy_pass http://backend; proxy_set_header Host $host; }
        location /health    { proxy_pass http://backend; proxy_set_header Host $host; }
        location = /openapi.json { proxy_pass http://backend; proxy_set_header Host $host; }
        location /docs      { proxy_pass http://backend; proxy_set_header Host $host; }

        # ── 프론트: React SPA (정적 + 클라이언트 라우팅 폴백) ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
